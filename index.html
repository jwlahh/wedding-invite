<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sreejith 💜 Anagha</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Cormorant Garamond', serif;
    background: radial-gradient(circle at 30% 20%, #f3ecfa, #e6d9f2 40%, #f6f3ee 100%);
    overflow: hidden;
}

/* CENTER */
.container {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CARD */
.card {
    position: relative;

    width: 75%;
    max-width: 900px;
    min-height: 75vh;

    padding: 60px;
    padding-bottom: 80px;

    border-radius: 30px;

    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(18px);

    border: 1px solid rgba(255,255,255,0.6);

    box-shadow:
        0 25px 80px rgba(123,76,160,0.18),
        inset 0 0 30px rgba(255,255,255,0.25);

    text-align: center;

    animation: fadeUp 1.4s ease, float 6s ease-in-out infinite;
}

@keyframes fadeUp {
    from {opacity:0; transform: translateY(40px);}
    to {opacity:1; transform: translateY(0);}
}

@keyframes float {
    0%,100% {transform: translateY(0);}
    50% {transform: translateY(-8px);}
}

/* CORNERS */
.card::before,
.card::after {
    content: "";
    position: absolute;
    width: 120px;
    height: 120px;
    background: radial-gradient(circle, rgba(142,124,195,0.15), transparent 70%);
}

.card::before { top: -40px; left: -40px; }
.card::after { bottom: -40px; right: -40px; }

/* TEXT */
.top { font-size: 28px; color: #7b4ca0; }

.title {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    margin: 10px 0;
    background: linear-gradient(45deg, #7b4ca0, #b39ddb);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.sub { font-size: 18px; color: #777; }

/* NAMES */
.names {
    margin: 30px 0;
    font-size: 36px;
    font-weight: 600;
    transition: 0.3s;
}

.names:hover { color: #7b4ca0; letter-spacing: 2px; }

/* DATE */
.date-box {
    display: flex;
    justify-content: center;
    gap: 25px;

    margin: 25px 0;

    font-size: 22px;
    letter-spacing: 2px;
}

.big-date {
    font-size: 32px;
    color: #7b4ca0;
    font-weight: 600;
}
/* VENUE */
.venue { font-size: 20px; margin-top: 10px; }

.location a {
    color: #7b4ca0;
    text-decoration: none;
}

/* COUNTDOWN (FIXED) */
.countdown {
    margin-top: 40px;
    display: flex;
    justify-content: center;
    gap: 40px;
}

.time-box {
    text-align: center;
}

.number {
    font-size: 28px;
    color: #7b4ca0;
    font-weight: 500;
}

.label {
    font-size: 11px;
    letter-spacing: 2px;
    color: #999;
}

/* FLOWERS */
.flower {
    position: fixed;
    top: -10px;
    color: #8e7cc3;
    font-size: 18px;
    opacity: 0.2;
    animation: fall linear infinite;
}

@keyframes fall {
    to { transform: translateY(100vh); }
}

/* LOADER */
#loader {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at 30% 20%, #f3ecfa, #e6d9f2, #f6f3ee);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.loader-svg { width: 300px; }

.line {
    fill: none;
    stroke: #8e7cc3;
    stroke-width: 2.5;

    stroke-linecap: round;
    stroke-linejoin: round;

    stroke-dasharray: 1700;
    stroke-dashoffset: 1700;

    animation: drawLotus 4s ease forwards;
}

@keyframes drawLotus {
    to { stroke-dashoffset: 0; }
}
.divider {
    width: 70px;
    height: 1px;
    margin: 25px auto;

    background: linear-gradient(to right, transparent, #b39ddb, transparent);
}
</style>
</head>

<body>

<div id="loader">
  <svg viewBox="0 0 200 200" class="loader-svg">
    <path class="line" d="M100 170 L100 130 C80 150,60 140,60 120 C60 90,90 90,100 110 C110 90,140 90,140 120 C140 140,120 150,100 130 L100 170"/>
  </svg>
</div>

<div class="container">
<div class="card">

<div class="top">ॐ</div>

<div class="title">Please Join Us On Our Special Day</div>
<div class="sub">Together with your families</div>
<div class="divider">
    <div class="names">
    Sreejith Jinachandran<br>
    ♡<br>
    Anagha O. Sudhakar
    </div>
</div>

<div class="divider">
    <div class="date-box">
    <div>MAY</div>
    <div class="big-date">09</div>
    <div>11:00 AM</div>
    </div>
</div>

<div class="divider">
    <div class="venue">
    Palliyalil Auditorium<br>
    Kulappulli, Shoranur
    </div>

    <div class="location">
    📍 <a href="https://maps.app.goo.gl/YRudBTEJrmcske4aA" target="_blank">
    Join us here — view on map
    </a>
    </div>
</div>


<div class="divider">
    <div class="countdown">
    <div class="time-box"><span class="number" id="days"></span><div class="label">DAYS</div></div>
    <div class="time-box"><span class="number" id="hours"></span><div class="label">HOURS</div></div>
    <div class="time-box"><span class="number" id="minutes"></span><div class="label">MIN</div></div>
    <div class="time-box"><span class="number" id="seconds"></span><div class="label">SEC</div></div>
    </div>
</div>


</div>
</div>

<script>
const weddingDate = new Date("May 9, 2026 11:00:00").getTime();

setInterval(() => {
    const now = new Date().getTime();
    const diff = weddingDate - now;

    document.getElementById("days").innerText = Math.floor(diff / (1000*60*60*24));
    document.getElementById("hours").innerText = Math.floor((diff / (1000*60*60)) % 24);
    document.getElementById("minutes").innerText = Math.floor((diff / (1000*60)) % 60);
    document.getElementById("seconds").innerText = Math.floor((diff / 1000) % 60);
}, 1000);

/* flowers */
for(let i=0;i<12;i++){
    let f=document.createElement("div");
    f.className="flower";
    f.innerHTML="❀";
    f.style.left=Math.random()*100+"vw";
    f.style.animationDuration=(6+Math.random()*6)+"s";
    document.body.appendChild(f);
}

/* loader */
window.addEventListener("load", () => {
    setTimeout(() => {
        document.getElementById("loader").style.display = "none";
    }, 3500);
});
</script>

</body>
</html>

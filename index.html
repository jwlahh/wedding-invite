<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Anagha 💜 Sreejith</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500&family=Parisienne&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: radial-gradient(circle at 30% 20%, #f3ecfa, #e6d9f2 40%, #f6f3ee 100%);
    overflow-x: hidden;
    overflow-y: auto;
}

/* CENTER */
.container {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CARD */
.card {
    position: relative;

    width: 75%;
    max-width: 900px;
    min-height: 75vh;

    padding: 60px;
    padding-bottom: 80px;

    border-radius: 30px;

    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(18px);

    border: 1px solid rgba(255,255,255,0.6);

    box-shadow:
        0 25px 80px rgba(123,76,160,0.18),
        inset 0 0 30px rgba(255,255,255,0.25);

    text-align: center;

    animation: fadeUp 1.4s ease, float 6s ease-in-out infinite;
}

@keyframes fadeUp {
    from {opacity:0; transform: translateY(40px);}
    to {opacity:1; transform: translateY(0);}
}

@keyframes float {
    0%,100% {transform: translateY(0);}
    50% {transform: translateY(-8px);}
}

/* CORNERS */
.card::before,
.card::after {
    content: "";
    position: absolute;
    width: 120px;
    height: 120px;
    background: radial-gradient(circle, rgba(142,124,195,0.15), transparent 70%);
}

.card::before { top: -40px; left: -40px; }
.card::after { bottom: -40px; right: -40px; }

/* TEXT */
.top {
    font-size: 32px;
    color: #7b4ca0;
}

.om-line {
    display: flex;
    align-items: center;
    justify-content: center;

    gap: 10px;
    margin: 8px auto 0;

    font-size: 14px;
    color: #b39ddb;
    letter-spacing: 2px;
    opacity: 0.9;
}

.title {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    font-weight: 500;
    letter-spacing: 2px;
    color:#7b4ca0;
}
.sub { font-size: 18px; color: #777; }

/* NAMES */
.names {
    font-family: 'Parisienne', cursive;
    font-size: 52px;
    line-height: 1.4;
    letter-spacing: 1px;

   color:#6d3f9c;
   transition: all 0.4s ease;
}


.names:hover {
    text-shadow:
        0 0 8px rgba(179,157,219,0.6),
        0 0 16px rgba(179,157,219,0.4),
        0 0 24px rgba(179,157,219,0.2);

    transform: scale(1.03);
}

.names br:nth-child(2) {
    font-size: 28px;
}
.heart {
    display: block;
    font-size: 30px;
    color: #b39ddb;
    margin: 8px 0;
}
/* DATE */
.date-box {
    display: grid;
    grid-template-columns: auto auto auto auto auto;
    align-items: center;
    justify-content: center;
    gap: 20px;

    margin: 35px 0;

    font-family: 'Playfair Display', serif;
}

/* side text */
.date-box .small {
    font-size: 25px;
    letter-spacing: 4px;
    color: #8e7cc3;
}

/* BIG DATE */
.big-date {
    font-size: 56px;
    font-weight: 600;
    letter-spacing: 5px;
    color: #6d3f9c;

    position: relative;
}


.separator {
    width: 1px;
    height: 25px;
    background: #d6c7ec;
}

/* VENUE */
.venue { font-size: 20px; margin-top: 10px; }

.location a {
    color: #7b4ca0;
    text-decoration: none;
    transition: all 0.3s ease;
}
.location a:hover {
    letter-spacing: 1.5px;
    color: #6d3f9c;
}

/* COUNTDOWN (FIXED) */
.countdown {
    margin-top: 40px;
    display: flex;
    justify-content: center;
    gap: 40px;
}

.time-box {
    text-align: center;
}

.number {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    font-weight: 400;
    letter-spacing: 3px;
    color: #6d3f9c;
}
.label {
    font-family: 'Montserrat', sans-serif;
    font-size: 10px;
    letter-spacing: 4px;
    color: #999;
}

/* FLOWERS */
.flower {
    position: fixed;
    top: -10px;
    color: #8e7cc3;
    font-size: 18px;
    opacity: 0.5;
    animation: fall linear infinite;
}

@keyframes fall {
    to { transform: translateY(100vh); }
}

/* LOADER */
#loader {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at 30% 20%, #f3ecfa, #e6d9f2, #f6f3ee);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.loader-svg { width: 300px; }

.line {
    fill: none;
    stroke: #8e7cc3;
    stroke-width: 2.5;

    stroke-linecap: round;
    stroke-linejoin: round;

    stroke-dasharray: 1700;
    stroke-dashoffset: 1700;

    animation: draw 5s cubic-bezier(.65,.05,.36,1) forwards;
}

@keyframes draw {
    to { stroke-dashoffset: 0; }
}
.divider {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin: 28px auto;
}

/* left + right lines */
.divider::before,
.divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, #cbb7e6);
}

/* reverse gradient for right side */
.divider::after {
    background: linear-gradient(to left, transparent, #cbb7e6);
}

/* center symbol */
.divider span {
    font-size: 20px;
    color: #b39ddb;
}
@media (max-width: 768px) {

    /* overall padding */
    .card {
        width: 90%;
        padding: 30px 20px;
        border-radius: 20px;
    }

    /* OM */
    .top {
        font-size: 24px;
    }

    .om-line {
        font-size: 12px;
    }

    /* title */
    .title {
        font-size: 24px;
        letter-spacing: 1px;
    }

    .sub {
        font-size: 14px;
    }

    /* names */
    .names {
        font-size: 40px;
        line-height: 1.3;
    }

    .heart {
        font-size: 20px;
    }

    /* divider */
    .divider span {
        font-size: 14px;
    }

    /* DATE (most important fix) */
    .date-box {
        grid-template-columns: auto;
        gap: 10px;
    }

    .separator {
        display: none; /* remove vertical lines */
    }

    .big-date {
        font-size: 44px;
    }

    .small {
        font-size: 12px;
        letter-spacing: 3px;
    }

    /* venue */
    .venue {
        font-size: 16px;
    }

    .location a {
        font-size: 14px;
    }

    /* countdown */
    .countdown {
        gap: 20px;
        flex-wrap: wrap;
    }

    .number {
        font-size: 28px;
    }

    .label {
        font-size: 9px;
        letter-spacing: 2px;
    }
}
</style>
</head>

<body>

<div id="loader">
  <svg viewBox="0 0 200 200" class="loader-svg">

    <path class="line"
      d="
      M100 170


      C100 150, 100 130, 100 115


      C90 125, 85 115, 95 105
      C105 95, 110 95, 100 115


      C70 110, 40 120, 50 90
      C60 65, 85 75, 100 95


      C95 110, 100 115, 100 110


      C85 100, 70 90, 80 75
      C90 65, 100 75, 100 90


      C95 70, 95 50, 100 35
      C105 50, 105 70, 100 110


      C110 100, 115 110, 105 120
      C100 125, 95 125, 100 110

   
      C115 100, 130 90, 120 75
      C110 65, 100 75, 100 90

      C110 100, 115 110, 105 120
      C100 125, 95 125, 100 110


      C130 110, 160 120, 150 90
      C140 65, 115 75, 100 95

      C100 130, 100 150, 100 170
      "
    />

  </svg>
</div>

<div class="container">
<div class="card">

<div class="top">
    ॐ
    <div class="om-line"> ༻❁༺ </div>
</div>

<div class="title">Please Join Us On Our Special Day</div>
<div class="sub">Together with your families</div>
<div class="divider"><span>⚜</span></div>
<div class="names">
    Anagha O Sudhakar<br>
    <span class="heart">♡</span>
    Sreejith Jinachandran
</div>

<div class="divider"><span>⚜</span></div>
<div class="date-box">
    <div class="small">MAY</div>
    <div class="separator"></div>

    <div class="big-date">09</div>
    <div class="separator"></div>

    <div class="small">11:00 AM</div>
</div>

<div class="divider"><span>⚜</span></div>
<div class="venue">
Palliyalil Auditorium<br>
Kulappulli, Shoranur
</div>

<div class="location">
📍 <a href="https://maps.app.goo.gl/YRudBTEJrmcske4aA" target="_blank">
Join us here — view on map
</a>
</div>

<div class="divider"><span>⚜</span></div>
<div class="countdown">
<div class="time-box"><span class="number" id="days"></span><div class="label">DAYS</div></div>
<div class="time-box"><span class="number" id="hours"></span><div class="label">HOURS</div></div>
<div class="time-box"><span class="number" id="minutes"></span><div class="label">MIN</div></div>
<div class="time-box"><span class="number" id="seconds"></span><div class="label">SEC</div></div>
</div>

</div>
</div>

<script>
const weddingDate = new Date("May 9, 2026 11:00:00").getTime();

setInterval(() => {
    const now = new Date().getTime();
    const diff = weddingDate - now;

    document.getElementById("days").innerText = Math.floor(diff / (1000*60*60*24));
    document.getElementById("hours").innerText = Math.floor((diff / (1000*60*60)) % 24);
    document.getElementById("minutes").innerText = Math.floor((diff / (1000*60)) % 60);
    document.getElementById("seconds").innerText = Math.floor((diff / 1000) % 60);
}, 1000);

/* flowers */
for(let i=0;i<12;i++){
    let f=document.createElement("div");
    f.className="flower";
    f.innerHTML="❀";
    f.style.left=Math.random()*100+"vw";
    f.style.animationDuration=(6+Math.random()*6)+"s";
    document.body.appendChild(f);
}

/* loader */
window.addEventListener("load", () => {
    setTimeout(() => {
        document.getElementById("loader").style.display = "none";
    }, 3500);
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Anagha 💜 Sreejith</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500&family=Parisienne&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Alex+Brush&display=swap" rel="stylesheet">

<style>

html, body {
    height: 100%;
    margin: hidden;
}
body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: radial-gradient(circle at 30% 20%, #f3ecfa, #e6d9f2 40%, #f6f3ee 100%);
    overflow-x: hidden;
    overflow-y: auto;
}

/* CENTER */
.container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* CARD */
.card {
    position: relative;

    width: 75%;
    max-width: 850px;
    transform-origin: center;

    padding: 30px 30px;
    padding-bottom: 80px;

    border-radius: 25px;

    background: rgba(255, 255, 255, 0.18);  /* more transparent */

    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px); /* safari */

    border-radius: 25px;

    border: 1px solid rgba(255, 255, 255, 0.3);

    box-shadow:
        0 8px 32px rgba(31, 38, 135, 0.12); 
    border: 1px solid rgba(255,255,255,0.6);

   
    text-align: center;

    animation: fadeUp 1.4s ease,
}

@keyframes fadeUp {
    from {opacity:0; transform: translateY(40px);}
    to {opacity:1; transform: translateY(0);}
}

@keyframes float {
    0%,100% {transform: translateY(0);}
    50% {transform: translateY(-8px);}
}

/* CORNERS */
.card::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;

    background: linear-gradient(
        120deg,
        rgba(255,255,255,0.25),
        rgba(255,255,255,0.05)
    );

    pointer-events: none;
}
.card::before,
.card::after {
    content: "";
    position: absolute;
    width: 120px;
    height: 120px;
    background: radial-gradient(circle, rgba(142,124,195,0.15), transparent 70%);
}

.card::before { top: -40px; left: -40px; }
.card::after { bottom: -40px; right: -40px; }

/* TEXT */
.top {
    font-size: 32px;
    color: #7b4ca0;
}

.om-line {
    display: flex;
    align-items: center;
    justify-content: center;

    gap: 10px;
    margin: 8px auto 0;

    font-size: 18px;
    color: #b39ddb;
    letter-spacing: 2px;
    opacity: 0.9;
}

.title {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 500;
    letter-spacing: 2px;
    color:#7b4ca0;
}
.sub { font-size: 16px; color: #777; }

/* NAMES */
.names {
    font-family: 'Parisienne', cursive;
    font-size: 52px;
    line-height: 1.4;
    letter-spacing: 1px;

   color:#6d3f9c;
   transition: all 0.4s ease;
}


.names:hover {
    text-shadow:
        0 0 8px rgba(179,157,219,0.6),
        0 0 16px rgba(179,157,219,0.4),
        0 0 24px rgba(179,157,219,0.2);

    transform: scale(1.03);
}

.names br:nth-child(2) {
    font-size: 28px;
}
.heart {
    display: block;
    font-size: 30px;
    color: #b39ddb;
    margin: 8px 0;
}
/* DATE */
.date-box {
    display: grid;
    justify-content: center;  /* ✅ THIS WAS MISSING */
    align-items: center;
    grid-template-columns: 1fr auto 1fr;
    width: 100%;
    max-width: 500px;
    margin: 35px auto;  /* ✅ center block */
    font-family: 'Playfair Display', serif;
}


/* side text */
.date-box .small {
    font-size: 25px;
    letter-spacing: 4px;
    color: #8e7cc3;
}

.left {
    text-align: right;
    font-size: 20px;
    letter-spacing: 5px;
    color: #5f4f7e;
}

.right {
    text-align: left;
    font-size: 20px;
    letter-spacing: 5px;
    color: #5f4f7e;
}

.center {
    text-align: center;
}

/* PERFECT CENTER DATE */
.big-date {
    font-family: 'Playfair Display', serif;
    font-size: 52px;
    letter-spacing: 2px;
    font-weight: 500;
    color: #6d3f9c;
}
.center::before,
.center::after {
    content: "";
    display: inline-block;
    width: 1px;
    height: 28px;

    background: linear-gradient(
        to bottom,
        transparent,
        rgba(123,76,160,0.6),
        transparent
    );

    margin: 0 18px;
    vertical-align: middle;
}


/* BIG DATE */
.big-date {
    font-size: 52px;
    font-weight: 600;
    letter-spacing: 5px;
    color: #6d3f9c;

    position: relative;
}



/* VENUE */
.venue { font-size: 20px; margin-top: 10px;font-family: 'Playfair Display', serif; }

.location a {
    color: #7b4ca0;
    text-decoration: none;
    transition: all 0.3s ease;
}
.location a:hover {
    letter-spacing: 1.5px;
    color: #6d3f9c;
}

/* COUNTDOWN (FIXED) */
.countdown {
    margin-top: 40px;
    display: flex;
    justify-content: center;
    gap: 30px;
}

.time-box {
    text-align: center;
}

.number {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    font-weight: 400;
    letter-spacing: 3px;
    color: #6d3f9c;
}
.label {
    font-family: 'Montserrat', sans-serif;
    font-size: 12px;
    letter-spacing: 4px;
    color: #694283;
}

/* FLOWERS */
.flower {
    position: fixed;
    top: -10px;
    color: #8e7cc3;
    font-size: 18px;
    opacity: 0.5;
    animation: fall linear infinite;
    z-index: 1;
}
@keyframes fall {
    to {
        transform: translateY(100vh);
    }
}

.flower.heavy {
    position: absolute;
    top: -80px;

    color: #8e7cc3;
    opacity: 0.9;
    z-index: 10000;
    animation: heavyFall linear forwards;
}

@keyframes heavyFall {
    0% {
        transform: translateY(-80px) rotate(0deg);
        opacity: 0;
    }
    10% {
        opacity: 1;
    }
    100% {
        transform: translateY(120vh) rotate(360deg);
        opacity: 0;
    }
}

/* LOADER */
#loader {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at 30% 20%, #f3ecfa, #e6d9f2, #f6f3ee);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    transition: opacity 0.8s ease;

    overflow: hidden; /* keeps explosion inside loader */
}


#loader.fade-out {
    opacity: 0;
    pointer-events: none;
}

.loader-svg { width: 500px; }

.as-text {
    font-family: 'Alex Brush', cursive;
    font-size: 100px;
    fill: transparent;
    stroke: #8e7cc3;
    stroke-width: 2;

    stroke-dasharray: 500;
    stroke-dashoffset: 500;

    animation: draw 2.5s ease forwards, fillIn 1.5s ease forwards;
    animation-delay: 0s, 2.2s;  /* fill starts after draw */
}
@keyframes draw {
    to {
        stroke-dashoffset: 0;
    }
}
@keyframes fillIn {
    from {
        fill: transparent;
    }
    to {
        fill: #8e7cc3;
    }
}
.divider {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin: 28px auto;
}

/* left + right lines */
.divider::before,
.divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, #cbb7e6);
}

/* reverse gradient for right side */
.divider::after {
    background: linear-gradient(to left, transparent, #cbb7e6);
}

/* center symbol */
.divider span {
    font-size: 20px;
    color: #b39ddb;
}
@media (max-width: 768px) {

     .date-box {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;   /* tighter spacing */
    }

    .left, .right {
        text-align: center;
        font-size: 14px;
        letter-spacing: 4px;
        color: #8e7cc3;
    }
    .card {
        width: 90%;
        padding: 30px 20px;
        border-radius: 20px;
    }

    /* OM */
    .top {
        font-size: 24px;
    }

    .om-line {
        font-size: 12px;
    }

    /* title */
    .title {
        font-size: 24px;
        letter-spacing: 1px;
    }

    .sub {
        font-size: 14px;
    }

    /* names */
    .names {
        font-size: 40px;
        line-height: 1.3;
    }

    .heart {
        font-size: 20px;
    }

    /* divider */
    .divider span {
        font-size: 14px;
    }

    /* DATE (most important fix) */
    

    .center::before,
    .center::after {
        display: none;
    }

    .separator {
        display: none; /* remove vertical lines */
    }

    .big-date {
        font-size: 46px;
    }

    .small {
        font-size: 12px;
        letter-spacing: 3px;
    }

    /* venue */
    .venue {
        font-size: 16px;
    }

    .location a {
        font-size: 14px;
    }

    /* countdown */
    .countdown {
        gap: 20px;
        flex-wrap: wrap;
    }

    .number {
        font-size: 28px;
    }

    .label {
        font-size: 9px;
        letter-spacing: 2px;
    }
}
</style>
</head>

<body>

<div id="loader">
  <svg viewBox="0 0 400 200" class="loader-svg">
    <text x="50%" y="55%" text-anchor="middle" class="as-text">
      AS
    </text>
  </svg>
</div>

<div class="container">
<div class="card">

<div class="top">
    ॐ
    <div class="om-line"> ༻❁༺ </div>
</div>

<div class="title">Please Join Us On Our Special Day</div>
<div class="sub">Together with your families</div>
<div class="divider"><span>⚜</span></div>
<div class="names">
    Anagha O Sudhakar<br>
    <span class="heart">♡</span>
    Sreejith Jinachandran
</div>

<div class="divider"><span>⚜</span></div>
<div class="date-box">
    <div class="left">MAY</div>

    <div class="center big-date">09</div>

    <div class="right">11:00 AM</div>
</div>

<div class="divider"><span>⚜</span></div>
<div class="venue">
Palliyalil Auditorium<br>
Kulappulli, Shoranur
</div>

<div class="location">
📍 <a href="https://maps.app.goo.gl/YRudBTEJrmcske4aA" target="_blank">
Join us here — view on map
</a>
</div>

<div class="divider"><span>⚜</span></div>
<div class="countdown">
<div class="time-box"><span class="number" id="days"></span><div class="label">DAYS</div></div>
<div class="time-box"><span class="number" id="hours"></span><div class="label">HOURS</div></div>
<div class="time-box"><span class="number" id="minutes"></span><div class="label">MIN</div></div>
<div class="time-box"><span class="number" id="seconds"></span><div class="label">SEC</div></div>
</div>

</div>
</div>

<script>
const weddingDate = new Date("May 9, 2026 11:00:00").getTime();

setInterval(() => {
    const now = new Date().getTime();
    const diff = weddingDate - now;

    document.getElementById("days").innerText = Math.floor(diff / (1000*60*60*24));
    document.getElementById("hours").innerText = Math.floor((diff / (1000*60*60)) % 24);
    document.getElementById("minutes").innerText = Math.floor((diff / (1000*60)) % 60);
    document.getElementById("seconds").innerText = Math.floor((diff / 1000) % 60);
}, 1000);

/* flowers */
for(let i=0;i<12;i++){
    let f=document.createElement("div");
    f.className="flower";
    f.innerHTML="❀";
    f.style.left=Math.random()*100+"vw";
    f.style.animationDuration=(6+Math.random()*6)+"s";
    document.body.appendChild(f);
}

function flowerShower() {
    const loader = document.getElementById("loader");

    for (let i = 0; i < 200; i++) {   // 🌸 LOTS of flowers

        let f = document.createElement("div");
        f.className = "flower heavy";
        f.innerHTML = Math.random() > 0.5 ? "❀" : "✿";

        // completely random position
        f.style.left = Math.random() * 100 + "vw";

        // random size (depth effect)
        f.style.fontSize = (14 + Math.random() * 14) + "px";

        // random fall duration
        f.style.animationDuration = (1.8 + Math.random() * 1.5) + "s";

        // random delay (THIS removes line effect)
        f.style.animationDelay = (Math.random() * 0.8) + "s";

        loader.appendChild(f);

        setTimeout(() => f.remove(), 3000);
    }
}

/* loader */
window.addEventListener("load", () => {

    setTimeout(() => {

        // 🌸 start heavy random shower
        flowerShower();

        const loader = document.getElementById("loader");

        // fade during shower
        setTimeout(() => {
            loader.classList.add("fade-out");

            setTimeout(() => {
                loader.style.display = "none";
            }, 800);

        }, 1000);

    }, 3000); // after AS animation
});

function fitCard() {
    const card = document.querySelector(".card");

    const viewportHeight = window.visualViewport 
        ? window.visualViewport.height 
        : window.innerHeight;

    const availableHeight = viewportHeight * 0.92;
    const cardHeight = card.scrollHeight;

    let scale = 1;

    if (cardHeight > availableHeight) {
        scale = availableHeight / cardHeight;
    }

    card.style.transform = `scale(${scale})`;
}

window.addEventListener("load", fitCard);
window.addEventListener("resize", fitCard);

/* mobile viewport changes */
if (window.visualViewport) {
    window.visualViewport.addEventListener("resize", fitCard);
}

</script>

</body>
</html>

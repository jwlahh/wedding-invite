<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;

    font-family: 'Cormorant Garamond', serif;

    /* premium lilac gradient */
    background: radial-gradient(circle at 30% 20%, #f3ecfa, #e6d9f2 40%, #f6f3ee 100%);
}

/* CENTER */
.container {
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* PREMIUM CARD */
.card {
    width: 75%;
    max-width: 900px;
    height: 75vh;

    padding: 60px;

    border-radius: 30px;

    background: rgba(255, 255, 255, 0.28);
    backdrop-filter: blur(20px);

    border: 1px solid rgba(255,255,255,0.5);

    box-shadow:
        0 20px 60px rgba(123,76,160,0.15),
        inset 0 0 40px rgba(255,255,255,0.2);

    text-align: center;

    display: flex;
    flex-direction: column;
    justify-content: center;

    /* entry animation */
    animation: fadeUp 1.4s ease;

    /* subtle floating */
    animation: float 6s ease-in-out infinite;
}

@keyframes fadeUp {
    from {opacity:0; transform: translateY(40px);}
    to {opacity:1; transform: translateY(0);}
}

@keyframes float {
    0%,100% {transform: translateY(0);}
    50% {transform: translateY(-8px);}
}
.card::before,
.card::after {
    content: "";
    position: absolute;
    width: 120px;
    height: 120px;

    background: radial-gradient(circle, rgba(142,124,195,0.15), transparent 70%);
}

/* TOP LEFT */
.card::before {
    top: -40px;
    left: -40px;
}

/* BOTTOM RIGHT */
.card::after {
    bottom: -40px;
    right: -40px;
}
/* TEXT */
.top {
    font-size: 30px;
    letter-spacing: 2px;
    color: #7b4ca0;
    margin-bottom: 10px;
}

.title {
    font-family: 'Playfair Display', serif;
    font-size: 40px;
    color: #7b4ca0;
    margin-bottom: 10px;

    /* subtle gradient text */
    background: linear-gradient(45deg, #7b4ca0, #b39ddb);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.sub {
    font-size: 25px;
    color: #777;
}

/* NAMES */
.names {
    margin: 35px 0;
    font-size: 48px;
    font-weight: 600;
    letter-spacing: 1px;

    transition: 0.3s ease;
}

.names:hover {
    letter-spacing: 2px;
    color: #7b4ca0;
}

/* DATE */
.date-box {
    display: flex;
    justify-content: center;
    gap: 50px;

    margin: 25px auto;

    padding: 15px 35px;

    border-radius: 20px;

    background: rgba(255,255,255,0.5);
    backdrop-filter: blur(10px);
    transition: 0.3s ease;
    font-size: 30px;
}

.date-box:hover {
    background: rgba(255,255,255,0.75);
}

.big-date {
    font-size: 38px;
    font-weight: bold;
    color: #8e7cc3;
}

/* VENUE */
.venue {
    font-size: 30px;
    margin-top: 10px;
}

.location a {
    text-decoration: none;
    color: #8e7cc3;
    font-size: 30px;
}

/* COUNTDOWN */
.countdown {
    margin-top: 35px;
    display: flex;
    justify-content: center;
    gap: 35px;
}

.countdown span {
    font-size: 48px;
    color: #7b4ca0;
}

.label {
    font-size: 11px;
    color: #777;
}

/* SUBTLE FLOWERS */
.flower {
    position: fixed;
    top: -10px;
    color: #8e7cc3;
    font-size: 30px;
    opacity: 0.4;
    animation: fall linear infinite;
}

@keyframes fall {
    to { transform: translateY(100vh); }
}
.card::before,
.card::after {
    content: "";
    position: absolute;
    width: 120px;
    height: 120px;

    background: radial-gradient(circle, rgba(142,124,195,0.15), transparent 70%);
}

/* TOP LEFT */
.card::before {
    top: -40px;
    left: -40px;
}

/* BOTTOM RIGHT */
.card::after {
    bottom: -40px;
    right: -40px;
}
/* LOADER SCREEN */
#loader {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at 30% 20%, #f3ecfa, #e6d9f2, #f6f3ee);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    transition: opacity 0.6s ease;
}

.loader-svg {
    width: 330px;
}

.line {
    fill: none;
    stroke: #8e7cc3;
    stroke-width: 2.5;

    stroke-linecap: round;
    stroke-linejoin: round;

    stroke-dasharray: 1700;
    stroke-dashoffset: 1700;

    animation: drawLotus 6s ease forwards;
}

@keyframes drawLotus {
    to {
        stroke-dashoffset: 0;
    }
}

/* SOFT GLOW */
@keyframes glow {
    from { opacity: 0.6; }
    to { opacity: 1; }
}
</style>
</head>

<body>
<div id="loader">
  <svg viewBox="0 0 200 200" class="loader-svg">
    <path class="line"
      d="
    
      M100 170 
      L100 130

    
      C95 125, 80 120, 80 135
      C80 150, 95 145, 100 130

     
      C70 140, 20 145, 15 110
      C10 80, 70 85, 95 110

      
      C90 100, 85 90, 95 90
      C105 90, 100 110, 100 120

      C85 80, 70 40, 85 25
      C100 10, 110 70, 100 120


      C90 90, 85 45, 100 15
      C115 10, 115 50, 105 110

     
      C110 120, 120 130, 125 120
      C130 110, 115 110, 110 120

      C125 80, 145 40, 135 25
      C125 15, 110 80, 105 120

     
      C130 110, 185 95, 190 115
      C195 140, 145 145, 120 130

    
      C130 140, 145 135, 140 120
      C135 110, 115 110, 100 130

   
      L100 170
      "
    />
  </svg>
</div>
<div class="container">

<div class="card">

    <div class="top">ॐ </div>

    
    <div class="title">Please Join Us On Our Special Day</div>

    <div class="sub">Together with your families</div>
    <div class="divider">
        <div class="names">
        Sreejith Jinachandran<br>
        ♡<br>
        Anagha O. Sudhakar
    </div>
    </div>
    

    <div class="date-box">
        <div>MAY </div>
        <div class="big-date">09</div>
        <div>11:00 AM</div>
    </div>

    <div class="venue">
        Palliyalil Auditorium<br>
        Kulappulli, Shoranur
    </div>

    <div class="location">
        📍 <a href="https://maps.app.goo.gl/YRudBTEJrmcske4aA" target="_blank">
            Join us here — view on map
        </a>
    </div>

    <div class="countdown">
        <div><span id="days"></span><div class="label">DAYS</div></div>
        <div><span id="hours"></span><div class="label">HOURS</div></div>
        <div><span id="minutes"></span><div class="label">MIN</div></div>
        <div><span id="seconds"></span><div class="label">SEC</div></div>
    </div>

</div>
</div>

<script>
// countdown
const weddingDate = new Date("May 9, 2026 11:00:00").getTime();

setInterval(() => {
    const now = new Date().getTime();
    const diff = weddingDate - now;

    document.getElementById("days").innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
    document.getElementById("hours").innerText = Math.floor((diff / (1000 * 60 * 60)) % 24);
    document.getElementById("minutes").innerText = Math.floor((diff / (1000 * 60)) % 60);
    document.getElementById("seconds").innerText = Math.floor((diff / 1000) % 60);
}, 1000);

// subtle petals
for(let i=0;i<20;i++){
    let f=document.createElement("div");
    f.className="flower";
    f.innerHTML="❀";
    f.style.left=Math.random()*100+"vw";
    f.style.animationDuration=(6+Math.random()*6)+"s";
    document.body.appendChild(f);
}
// hide loader after animation
window.addEventListener("load", () => {
    setTimeout(() => {
        const loader = document.getElementById("loader");
        loader.style.opacity = "0";

        setTimeout(() => {
            loader.style.display = "none";
        }, 600);
    }, 2600);
});
</script>

</body>
</html>
